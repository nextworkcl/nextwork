<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nextwork Pro</title>
<link rel="icon" type="image/png" href="logo.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1" integrity="sha384-UQ9Ztz63gzT2JZCuDRkNXV8RP/gXxdPUuM9LKlz2BzqGx9xFYNAK8yAEgbfZHs7P" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0e0c;--ink2:#3d3b36;--ink3:#7a7870;--cream:#f5f2eb;--cream2:#ede9e0;--cream3:#dedad1;--accent:#1a3a2a;--accent2:#2d6b4a;--accent3:#4d9e72;--glow:#c8f0d8;--glow2:#e8f7ef;--surface:#ffffff;--r:14px}
body{font-family:'DM Sans',sans-serif;background:var(--cream2);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6}
a{text-decoration:none;color:inherit}

nav{position:sticky;top:0;z-index:100;background:rgba(245,242,235,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream3);padding:0 2.5rem;height:62px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;font-weight:500;font-size:17px;letter-spacing:-.4px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.logo-word span{color:var(--accent2)}
.back-link{font-size:13px;color:var(--ink3)}
.back-link:hover{color:var(--accent2)}

.wrap{max-width:520px;margin:0 auto;padding:3rem 1.5rem 5rem;text-align:center}
.badge{display:inline-block;background:var(--glow2);color:var(--accent2);font-size:12px;font-weight:700;letter-spacing:.5px;padding:4px 14px;border-radius:20px;margin-bottom:1rem}
.page-title{font-family:'DM Serif Display',serif;font-size:2.2rem;margin-bottom:.5rem}
.page-sub{font-size:14px;color:var(--ink3);margin-bottom:2rem}

.plan-card{background:var(--surface);border:1.5px solid var(--accent3);border-radius:var(--r);padding:2rem;text-align:left}
.price{font-family:'DM Serif Display',serif;font-size:2.4rem;margin-bottom:.2rem}
.price span{font-size:14px;color:var(--ink3);font-family:'DM Sans',sans-serif}
.perks{list-style:none;margin:1.5rem 0}
.perks li{display:flex;gap:.6rem;font-size:14px;color:var(--ink2);margin-bottom:.7rem;align-items:flex-start}
.perks li::before{content:'✓';color:var(--accent2);font-weight:700}

.cta-btn{width:100%;padding:13px;background:var(--accent);color:var(--glow);border:none;border-radius:24px;font-size:14.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.cta-btn:disabled{opacity:.6;cursor:not-allowed}
.already-pro{background:var(--glow2);color:var(--accent2);border-radius:var(--r);padding:1.2rem;font-size:14px;font-weight:500;text-align:center}
.gate{color:var(--ink3);font-size:13px;margin-top:1rem}
.err-box{font-size:12.5px;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;margin-top:1rem;display:none}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><img src="logo.png?v=2" alt="Nextwork"></div>
    <span class="logo-word">next<span>work</span></span>
  </a>
  <a href="dashboard.html" class="back-link">← Volver al dashboard</a>
</nav>

<div class="wrap">
  <div class="badge">NEXTWORK PRO</div>
  <h1 class="page-title">Destaca en la comunidad</h1>
  <p class="page-sub">Para quienes se toman en serio encontrar equipo, inversión u oportunidades.</p>

  <div id="content"></div>
</div>

<script>
const _sb=window.supabase.createClient(
  'https://vkewxmrutpjmdrxsqdea.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZXd4bXJ1dHBqbWRyeHNxZGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjUwMTYsImV4cCI6MjA5NDEwMTAxNn0.Ety8tIitQKW_3hEaH0obDnmewPx2Opx_ZPmUmIP9ZU0'
);

const FUNCTIONS_URL='https://vkewxmrutpjmdrxsqdea.supabase.co/functions/v1/create-checkout-session';

async function startCheckout(){
  const btn=document.getElementById('cta-btn');
  const errEl=document.getElementById('cta-err');
  errEl.style.display='none';
  btn.textContent='Redirigiendo a pago seguro...';btn.disabled=true;
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){window.location.href='login.html';return;}
  try{
    const res=await fetch(FUNCTIONS_URL,{
      method:'POST',
      headers:{'Authorization':'Bearer '+session.access_token,'Content-Type':'application/json'}
    });
    const data=await res.json();
    if(!res.ok||!data.url)throw new Error(data.error||'No pudimos iniciar el pago');
    window.location.href=data.url;
  }catch(e){
    errEl.textContent=e.message;
    errEl.style.display='block';
    btn.textContent='Suscribirme →';btn.disabled=false;
  }
}

(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  const content=document.getElementById('content');

  if(!session){
    content.innerHTML=`
      <div class="plan-card">
        <div class="price">$9.990<span>/mes</span></div>
        <ul class="perks">
          <li>Destaca tus oportunidades — aparecen primero y con badge ⭐</li>
          <li>Badge PRO en tu perfil y en resultados de búsqueda</li>
          <li>Prioridad en soporte</li>
        </ul>
        <button class="cta-btn" onclick="window.location.href='login.html'">Inicia sesión para suscribirte</button>
      </div>`;
    return;
  }

  const {data:p}=await _sb.from('profiles').select('pro_active,pro_current_period_end').eq('id',session.user.id).single();
  if(p&&p.pro_active){
    const until=p.pro_current_period_end?new Date(p.pro_current_period_end).toLocaleDateString('es-CL'):null;
    content.innerHTML=`<div class="already-pro">✓ Ya eres Nextwork Pro${until?'. Tu plan se renueva el '+until:''}.</div>`;
    return;
  }

  content.innerHTML=`
    <div class="plan-card">
      <div class="price">$9.990<span>/mes</span></div>
      <ul class="perks">
        <li>Destaca tus oportunidades — aparecen primero y con badge ⭐</li>
        <li>Badge PRO en tu perfil y en resultados de búsqueda</li>
        <li>Prioridad en soporte</li>
      </ul>
      <button class="cta-btn" id="cta-btn" onclick="startCheckout()">Suscribirme →</button>
      <div class="err-box" id="cta-err"></div>
    </div>
    <p class="gate">Pago procesado de forma segura por Stripe. Cancela cuando quieras.</p>`;
})();
</script>
</body>
</html>
