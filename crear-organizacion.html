<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear organización · Nextwork</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1" integrity="sha384-UQ9Ztz63gzT2JZCuDRkNXV8RP/gXxdPUuM9LKlz2BzqGx9xFYNAK8yAEgbfZHs7P" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0e0c;--ink2:#3d3b36;--ink3:#7a7870;--cream:#f5f2eb;--cream2:#ede9e0;--cream3:#dedad1;--accent:#1a3a2a;--accent2:#2d6b4a;--accent3:#4d9e72;--glow:#c8f0d8;--glow2:#e8f7ef;--surface:#ffffff;--r:14px}
body{font-family:'DM Sans',sans-serif;background:var(--cream2);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6}
a{text-decoration:none;color:inherit}

nav{position:sticky;top:0;z-index:100;background:rgba(245,242,235,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream3);padding:0 2.5rem;height:62px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;font-weight:500;font-size:17px;letter-spacing:-.4px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.logo-word span{color:var(--accent2)}
.back-link{font-size:13px;color:var(--ink3)}
.back-link:hover{color:var(--accent2)}

.wrap{max-width:560px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
.page-title{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:.3rem}
.page-sub{font-size:13.5px;color:var(--ink3);margin-bottom:1.8rem}

.form-card{background:var(--surface);border:1px solid var(--cream3);border-radius:var(--r);padding:1.5rem}
.form-group{margin-bottom:1.1rem}
.form-group label{display:block;font-size:11.5px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.form-group input[type=text],.form-group textarea{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid var(--cream3);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none}
.form-group textarea{resize:vertical;min-height:90px}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent3)}

.logo-picker{display:flex;align-items:center;gap:1rem}
.logo-preview{width:64px;height:64px;border-radius:14px;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;overflow:hidden;flex-shrink:0}
.logo-preview img{width:100%;height:100%;object-fit:cover}
.file-btn{padding:8px 16px;border-radius:18px;border:1.5px solid var(--cream3);background:var(--surface);font-size:12.5px;cursor:pointer;color:var(--ink2)}

.submit-btn{width:100%;padding:12px;background:var(--accent);color:var(--glow);border:none;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:.5rem}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.form-err{font-size:12.5px;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;display:none;margin-bottom:1rem}
.gate{text-align:center;padding:5rem 1rem;color:var(--ink3)}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><img src="logo.png?v=2" alt="Nextwork"></div>
    <span class="logo-word">next<span>work</span></span>
  </a>
  <a href="dashboard.html" class="back-link">← Volver al dashboard</a>
</nav>

<div class="wrap">
  <div id="gate" class="gate" style="display:none">Cargando…</div>

  <div id="form-wrap" style="display:none">
    <h1 class="page-title">Crear organización</h1>
    <p class="page-sub">Publica oportunidades y arma equipo a nombre de tu startup, no solo como persona.</p>

    <div class="form-card">
      <div id="form-err" class="form-err"></div>
      <div class="form-group">
        <label>Logo</label>
        <div class="logo-picker">
          <div class="logo-preview" id="logo-preview">🏢</div>
          <input type="file" id="logo-input" accept="image/*" style="display:none" onchange="handleLogo(event)">
          <button type="button" class="file-btn" onclick="document.getElementById('logo-input').click()">Subir logo</button>
        </div>
      </div>
      <div class="form-group"><label>Nombre</label><input type="text" id="org-name" maxlength="100" placeholder="Ej. Rocketbot"></div>
      <div class="form-group"><label>Descripción</label><textarea id="org-desc" maxlength="1000" placeholder="A qué se dedica, en qué etapa está"></textarea></div>
      <div class="form-group"><label>Sitio web (opcional)</label><input type="text" id="org-website" maxlength="200" placeholder="https://..."></div>
      <div class="form-group"><label>Ubicación (opcional)</label><input type="text" id="org-location" maxlength="60" placeholder="Ej. Santiago, Chile"></div>
      <button class="submit-btn" id="submit-btn" onclick="createOrganization()">Crear organización →</button>
    </div>
  </div>
</div>

<script>
const _sb=window.supabase.createClient(
  'https://vkewxmrutpjmdrxsqdea.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZXd4bXJ1dHBqbWRyeHNxZGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjUwMTYsImV4cCI6MjA5NDEwMTAxNn0.Ety8tIitQKW_3hEaH0obDnmewPx2Opx_ZPmUmIP9ZU0'
);

let currentUserId=null;
let orgLogo=null;

function handleLogo(e){
  const file=e.target.files[0];
  if(!file)return;
  if(file.size>5*1024*1024){alert('El logo no puede superar 5 MB');return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    orgLogo=ev.target.result;
    document.getElementById('logo-preview').innerHTML=`<img src="${orgLogo}" alt="logo">`;
  };
  reader.readAsDataURL(file);
}

async function createOrganization(){
  const errEl=document.getElementById('form-err');
  const btn=document.getElementById('submit-btn');
  errEl.style.display='none';
  const name=document.getElementById('org-name').value.trim();
  const description=document.getElementById('org-desc').value.trim();
  const website=document.getElementById('org-website').value.trim();
  const location=document.getElementById('org-location').value.trim();

  if(name.length<2){errEl.textContent='El nombre debe tener al menos 2 caracteres.';errEl.style.display='block';return;}

  btn.textContent='Creando...';btn.disabled=true;
  const {data,error}=await _sb.from('organizations').insert({
    name, description: description||null, website: website||null,
    location: location||null, logo: orgLogo, created_by: currentUserId
  }).select().single();
  btn.textContent='Crear organización →';btn.disabled=false;

  if(error){
    errEl.textContent=error.message||'No pudimos crear la organización';
    errEl.style.display='block';
    return;
  }
  window.location.href='organizacion.html?id='+data.id;
}

(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){
    document.getElementById('gate').innerHTML='Inicia sesión para crear una organización. <a href="login.html" style="color:var(--accent2);font-weight:600">Iniciar sesión</a>';
    document.getElementById('gate').style.display='block';
    return;
  }
  const {data:p}=await _sb.from('profiles').select('id').eq('id',session.user.id).single();
  if(!p){
    document.getElementById('gate').innerHTML='Crea tu perfil primero. <a href="crear-perfil.html" style="color:var(--accent2);font-weight:600">Crear mi perfil</a>';
    document.getElementById('gate').style.display='block';
    return;
  }
  currentUserId=session.user.id;
  document.getElementById('form-wrap').style.display='block';
})();
</script>
</body>
</html>
