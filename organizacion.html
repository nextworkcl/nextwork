<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organización · Nextwork</title>
<link rel="icon" type="image/png" href="logo.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1" integrity="sha384-UQ9Ztz63gzT2JZCuDRkNXV8RP/gXxdPUuM9LKlz2BzqGx9xFYNAK8yAEgbfZHs7P" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0e0c;--ink2:#3d3b36;--ink3:#7a7870;--cream:#f5f2eb;--cream2:#ede9e0;--cream3:#dedad1;--accent:#1a3a2a;--accent2:#2d6b4a;--accent3:#4d9e72;--glow:#c8f0d8;--glow2:#e8f7ef;--surface:#ffffff;--r:14px}
body{font-family:'DM Sans',sans-serif;background:var(--cream2);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6}
a{text-decoration:none;color:inherit}

nav{position:sticky;top:0;z-index:100;background:rgba(245,242,235,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream3);padding:0 2.5rem;height:62px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;font-weight:500;font-size:17px;letter-spacing:-.4px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.logo-word span{color:var(--accent2)}
.back-link{font-size:13px;color:var(--ink3)}
.back-link:hover{color:var(--accent2)}

.wrap{max-width:760px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
.gate{text-align:center;padding:5rem 1rem;color:var(--ink3)}

.org-header{background:var(--surface);border:1px solid var(--cream3);border-radius:var(--r);padding:1.6rem;display:flex;gap:1.2rem;align-items:flex-start;margin-bottom:1.4rem;flex-wrap:wrap}
.org-logo{width:76px;height:76px;border-radius:16px;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden;flex-shrink:0}
.org-logo img{width:100%;height:100%;object-fit:cover}
.org-name{font-family:'DM Serif Display',serif;font-size:1.6rem}
.org-meta{font-size:13px;color:var(--ink3);margin-top:.2rem}
.org-desc{font-size:13.5px;color:var(--ink2);margin-top:.7rem;white-space:pre-line}
.org-actions{margin-left:auto;display:flex;gap:.5rem;flex-wrap:wrap}

.section-card{background:var(--surface);border:1px solid var(--cream3);border-radius:var(--r);padding:1.3rem 1.4rem;margin-bottom:1.2rem}
.section-card h3{font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:1rem}

.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.7rem}
.member-chip{display:flex;align-items:center;gap:.6rem;background:var(--cream2);border-radius:12px;padding:.6rem .8rem}
.member-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;overflow:hidden}
.member-name{font-size:13px;font-weight:600}
.member-role{font-size:11px;color:var(--ink3)}
.admin-tag{font-size:9.5px;font-weight:700;color:var(--accent2);background:var(--glow2);padding:1px 7px;border-radius:6px;margin-left:auto}

.btn-outline{padding:8px 16px;border-radius:18px;border:1.5px solid var(--accent3);background:transparent;color:var(--accent2);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-solid{padding:8px 16px;border-radius:18px;border:none;background:var(--accent);color:var(--glow);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}

.opp-mini{background:var(--cream2);border-radius:10px;padding:.8rem 1rem;margin-bottom:.6rem}
.opp-mini-title{font-weight:600;font-size:13.5px}
.opp-mini-type{font-size:11px;color:var(--ink3);margin-top:2px}

.add-member-row{display:flex;gap:.5rem;margin-top:.8rem}
.add-member-row input{flex:1;padding:8px 12px;border-radius:9px;border:1.5px solid var(--cream3);font-family:'DM Sans',sans-serif;font-size:12.5px}
.hint{font-size:11.5px;color:var(--ink3);margin-top:.4rem}

.empty-state{text-align:center;padding:1.5rem;color:var(--ink3);font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 22px;border-radius:24px;font-size:13.5px;opacity:0;pointer-events:none;transition:all .3s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><img src="logo.png?v=2" alt="Nextwork"></div>
    <span class="logo-word">next<span>work</span></span>
  </a>
  <a href="dashboard.html" class="back-link">← Volver al dashboard</a>
</nav>

<div class="wrap">
  <div id="gate" class="gate" style="display:none">Cargando…</div>
  <div id="org-page" style="display:none">
    <div class="org-header" id="org-header"></div>

    <div class="section-card">
      <h3>Equipo</h3>
      <div class="member-grid" id="member-grid"></div>
      <div id="admin-tools" style="display:none">
        <div class="add-member-row">
          <input type="text" id="add-member-id" placeholder="ID de perfil de la persona a agregar">
          <button class="btn-solid" onclick="addMember()">Agregar</button>
        </div>
        <div class="hint">El ID está en la URL del perfil de esa persona: perfil-publico.html?id=<b>ESTE-ID</b></div>
      </div>
      <div id="leave-tools" style="display:none;margin-top:.8rem">
        <button class="btn-outline" onclick="leaveOrganization()">Salir de la organización</button>
      </div>
    </div>

    <div class="section-card">
      <h3>Oportunidades publicadas</h3>
      <div id="org-opps"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const _sb=window.supabase.createClient(
  'https://vkewxmrutpjmdrxsqdea.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZXd4bXJ1dHBqbWRyeHNxZGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjUwMTYsImV4cCI6MjA5NDEwMTAxNn0.Ety8tIitQKW_3hEaH0obDnmewPx2Opx_ZPmUmIP9ZU0'
);

function escapeHtml(str){
  if(str==null)return '';
  return String(str).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function getInitials(name){
  if(!name) return '?';
  return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}
function getColor(name){
  const colors=['#1a3a2a','#1e4a8a','#4a1a5a','#6b3a1a','#1a4a4a','#2d6b4a','#3a2a1a'];
  let h=0; for(let c of (name||'')) h=(h*31+c.charCodeAt(0))%colors.length;
  return colors[h];
}
const TYPE_LABELS={startup:'🚀 Startup',freelance:'⚡ Freelance',idea:'💡 Idea',collab:'🤝 Colaboración',equity:'📈 Equity'};

const orgId=new URLSearchParams(window.location.search).get('id');
let currentUserId=null;
let isOrgAdmin=false;
let isOrgMember=false;

async function loadOrganization(){
  const {data:org,error}=await _sb.from('organizations').select('*').eq('id',orgId).single();
  if(error||!org){
    document.getElementById('gate').textContent='No encontramos esta organización.';
    document.getElementById('gate').style.display='block';
    return;
  }
  document.title=org.name+' · Nextwork';

  const {data:members}=await _sb.from('organization_members').select('*').eq('organization_id',orgId).order('joined_at',{ascending:true});
  const memberIds=(members||[]).map(m=>m.user_id);
  let profileById={};
  if(memberIds.length){
    const {data:profiles}=await _sb.from('perfiles_publicos').select('*').in('id',memberIds);
    (profiles||[]).forEach(p=>profileById[p.id]=p);
  }

  if(currentUserId){
    const mine=(members||[]).find(m=>m.user_id===currentUserId);
    isOrgMember=!!mine;
    isOrgAdmin=!!mine&&mine.role==='admin';
  }

  document.getElementById('org-header').innerHTML=`
    <div class="org-logo">${org.logo?`<img src="${escapeHtml(org.logo)}" alt="${escapeHtml(org.name)}">`:'🏢'}</div>
    <div style="flex:1;min-width:200px">
      <div class="org-name">${escapeHtml(org.name)}</div>
      <div class="org-meta">${org.location?escapeHtml(org.location):''}${org.website?` · <a href="${escapeHtml(org.website.startsWith('http')?org.website:'https://'+org.website)}" target="_blank" style="color:var(--accent2)">${escapeHtml(org.website)}</a>`:''}</div>
      ${org.description?`<div class="org-desc">${escapeHtml(org.description)}</div>`:''}
    </div>`;

  document.getElementById('member-grid').innerHTML=(members||[]).map(m=>{
    const p=profileById[m.user_id]||{id:m.user_id,name:'Usuario'};
    const initials=getInitials(p.name);
    const color=p.color||getColor(p.name);
    return `<a href="perfil-publico.html?id=${p.id}" class="member-chip">
      <div class="member-av" style="background:${color};overflow:hidden">${p.photo?`<img src="${escapeHtml(p.photo)}" alt="Foto de perfil de ${escapeHtml(p.name)||'usuario'}" style="width:100%;height:100%;object-fit:cover">`:initials}</div>
      <div><div class="member-name">${escapeHtml(p.name||'Usuario')}</div><div class="member-role">${escapeHtml(p.role||'')}</div></div>
      ${m.role==='admin'?'<span class="admin-tag">ADMIN</span>':''}
    </a>`;
  }).join('')||'<div class="empty-state">Sin miembros.</div>';

  if(isOrgAdmin)document.getElementById('admin-tools').style.display='block';
  if(isOrgMember)document.getElementById('leave-tools').style.display='block';

  const {data:opps}=await _sb.from('opportunities').select('*').eq('organization_id',orgId).order('created_at',{ascending:false});
  const oppsEl=document.getElementById('org-opps');
  if(!opps||!opps.length){
    oppsEl.innerHTML='<div class="empty-state">Esta organización aún no ha publicado oportunidades.</div>';
  } else {
    oppsEl.innerHTML=opps.map(o=>`
      <a href="oportunidades.html" class="opp-mini" style="display:block">
        <div class="opp-mini-title">${escapeHtml(o.title)}</div>
        <div class="opp-mini-type">${TYPE_LABELS[o.type]||o.type}${o.location?' · '+escapeHtml(o.location):''}</div>
      </a>`).join('');
  }

  document.getElementById('gate').style.display='none';
  document.getElementById('org-page').style.display='block';
}

async function addMember(){
  const input=document.getElementById('add-member-id');
  const targetId=input.value.trim();
  if(!targetId)return;
  const {error}=await _sb.from('organization_members').insert({organization_id:orgId,user_id:targetId,role:'member'});
  if(error){showToast(error.message||'No pudimos agregar a esa persona');return;}
  input.value='';
  showToast('Miembro agregado ✓');
  loadOrganization();
}

async function leaveOrganization(){
  if(!confirm('¿Salir de esta organización?'))return;
  const {error}=await _sb.from('organization_members').delete().eq('organization_id',orgId).eq('user_id',currentUserId);
  if(error){showToast(error.message||'No pudimos completar la acción');return;}
  showToast('Saliste de la organización');
  window.location.href='dashboard.html';
}

(async()=>{
  if(!orgId){
    document.getElementById('gate').textContent='Organización no especificada.';
    document.getElementById('gate').style.display='block';
    return;
  }
  const {data:{session}}=await _sb.auth.getSession();
  if(session)currentUserId=session.user.id;
  await loadOrganization();
})();
</script>
</body>
</html>
