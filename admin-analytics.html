<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analíticas · Nextwork</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1" integrity="sha384-UQ9Ztz63gzT2JZCuDRkNXV8RP/gXxdPUuM9LKlz2BzqGx9xFYNAK8yAEgbfZHs7P" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0e0c;--ink2:#3d3b36;--ink3:#7a7870;--cream:#f5f2eb;--cream2:#ede9e0;--cream3:#dedad1;--accent:#1a3a2a;--accent2:#2d6b4a;--accent3:#4d9e72;--glow:#c8f0d8;--glow2:#e8f7ef;--surface:#ffffff;--r:14px}
body{font-family:'DM Sans',sans-serif;background:var(--cream2);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.6}
a{text-decoration:none;color:inherit}

nav{position:sticky;top:0;z-index:100;background:rgba(245,242,235,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream3);padding:0 2.5rem;height:62px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;font-weight:500;font-size:17px;letter-spacing:-.4px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.logo-word span{color:var(--accent2)}
.back-link{font-size:13px;color:var(--ink3)}
.back-link:hover{color:var(--accent2)}

.wrap{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem 5rem}
.page-title{font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:.3rem}
.page-sub{font-size:13.5px;color:var(--ink3);margin-bottom:1.8rem}

.gate{text-align:center;padding:5rem 1rem;color:var(--ink3)}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.8rem;margin-bottom:2rem}
.stat-tile{background:var(--surface);border:1px solid var(--cream3);border-radius:var(--r);padding:1.1rem 1.2rem}
.stat-num{font-family:'DM Serif Display',serif;font-size:1.9rem;color:var(--accent2)}
.stat-label{font-size:12px;color:var(--ink3);margin-top:.2rem}

.section-card{background:var(--surface);border:1px solid var(--cream3);border-radius:var(--r);padding:1.3rem 1.4rem;margin-bottom:1.2rem}
.section-card h3{font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:1rem}

.funnel-row{margin-bottom:.9rem}
.funnel-label{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink2);margin-bottom:.3rem}
.funnel-bar-bg{background:var(--cream2);border-radius:8px;height:10px;overflow:hidden}
.funnel-bar-fill{background:var(--accent2);height:100%;border-radius:8px;transition:width .4s}

.chart-wrap{display:flex;align-items:flex-end;gap:3px;height:90px;margin-top:.5rem}
.chart-bar{flex:1;background:var(--accent3);border-radius:3px 3px 0 0;min-height:2px}
.chart-bar-empty{background:var(--cream3)}

.referrer-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--cream2);font-size:13px}
.referrer-row:last-child{border-bottom:none}
.referrer-count{background:var(--glow2);color:var(--accent2);font-weight:600;font-size:12px;padding:2px 10px;border-radius:10px}

.empty-state{text-align:center;padding:1.5rem;color:var(--ink3);font-size:13px}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark"><img src="logo.png?v=2" alt="Nextwork"></div>
    <span class="logo-word">next<span>work</span></span>
  </a>
  <a href="dashboard.html" class="back-link">← Volver al dashboard</a>
</nav>

<div class="wrap">
  <div id="gate" class="gate" style="display:none">Cargando…</div>

  <div id="panel" style="display:none">
    <h1 class="page-title">Analíticas</h1>
    <p class="page-sub">Cómo está creciendo la plataforma, en vivo.</p>

    <div class="stat-grid" id="stat-grid"></div>

    <div class="section-card">
      <h3>Activación</h3>
      <div id="funnel"></div>
    </div>

    <div class="section-card">
      <h3>Perfiles nuevos, últimos 30 días</h3>
      <div class="chart-wrap" id="signup-chart"></div>
    </div>

    <div class="section-card">
      <h3>Top invitadores</h3>
      <div id="referrers-list"></div>
    </div>
  </div>
</div>

<script>
const _sb=window.supabase.createClient(
  'https://vkewxmrutpjmdrxsqdea.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZXd4bXJ1dHBqbWRyeHNxZGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjUwMTYsImV4cCI6MjA5NDEwMTAxNn0.Ety8tIitQKW_3hEaH0obDnmewPx2Opx_ZPmUmIP9ZU0'
);

function escapeHtml(str){
  if(str==null)return '';
  return String(str).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderStats(s){
  const tiles=[
    ['Perfiles', s.total_profiles],
    ['Publicaciones', s.total_posts],
    ['Oportunidades', s.total_opportunities],
    ['Postulaciones', s.total_applications],
    ['Mensajes', s.total_messages],
    ['Conexiones aceptadas', s.connections_accepted]
  ];
  document.getElementById('stat-grid').innerHTML=tiles.map(([label,num])=>`
    <div class="stat-tile">
      <div class="stat-num">${num}</div>
      <div class="stat-label">${label}</div>
    </div>`).join('');
}

function renderFunnel(s){
  const total=s.total_profiles||0;
  const steps=[
    ['Perfiles creados', total, total],
    ['Con biografía completa', s.profiles_with_bio, total],
    ['Con al menos 1 conexión aceptada', s.users_with_connection, total],
    ['Enviaron al menos 1 mensaje', s.users_with_message_sent, total]
  ];
  document.getElementById('funnel').innerHTML=steps.map(([label,value,base])=>{
    const pct=base>0?Math.round((value/base)*100):0;
    return `<div class="funnel-row">
      <div class="funnel-label"><span>${label}</span><span>${value} (${pct}%)</span></div>
      <div class="funnel-bar-bg"><div class="funnel-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderSignupChart(days){
  const chart=document.getElementById('signup-chart');
  const byDay={};
  (days||[]).forEach(d=>{byDay[d.day]=d.count;});
  const today=new Date();
  const bars=[];
  for(let i=29;i>=0;i--){
    const d=new Date(today);
    d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    bars.push({day:key,count:byDay[key]||0});
  }
  const max=Math.max(1,...bars.map(b=>b.count));
  chart.innerHTML=bars.map(b=>
    `<div class="chart-bar${b.count===0?' chart-bar-empty':''}" style="height:${Math.max(3,(b.count/max)*90)}px" title="${b.day}: ${b.count}"></div>`
  ).join('');
}

function renderReferrers(list){
  const el=document.getElementById('referrers-list');
  if(!list||!list.length){
    el.innerHTML='<div class="empty-state">Nadie ha invitado a alguien todavía.</div>';
    return;
  }
  el.innerHTML=list.map(r=>`
    <div class="referrer-row">
      <a href="perfil-publico.html?id=${r.id}">${escapeHtml(r.name||'Usuario')}</a>
      <span class="referrer-count">${r.referred_count} invitado${r.referred_count===1?'':'s'}</span>
    </div>`).join('');
}

(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){
    window.location.href='login.html';
    return;
  }
  const {data:p}=await _sb.from('profiles').select('is_admin').eq('id',session.user.id).single();
  if(!p||!p.is_admin){
    document.getElementById('gate').textContent='No tienes acceso a esta página.';
    document.getElementById('gate').style.display='block';
    return;
  }

  const {data:stats,error}=await _sb.rpc('get_admin_stats');
  if(error||!stats){
    document.getElementById('gate').textContent='No pudimos cargar las analíticas.';
    document.getElementById('gate').style.display='block';
    return;
  }

  document.getElementById('gate').style.display='none';
  document.getElementById('panel').style.display='block';
  renderStats(stats);
  renderFunnel(stats);
  renderSignupChart(stats.signups_last_30_days);
  renderReferrers(stats.top_referrers);
})();
</script>
</body>
</html>
