<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña · Nextwork</title>
<link rel="icon" type="image/png" href="logo.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.1" integrity="sha384-UQ9Ztz63gzT2JZCuDRkNXV8RP/gXxdPUuM9LKlz2BzqGx9xFYNAK8yAEgbfZHs7P" crossorigin="anonymous"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#0f0e0c;--ink2:#3d3b36;--ink3:#7a7870;--cream:#f5f2eb;--cream2:#ede9e0;--cream3:#dedad1;--accent:#1a3a2a;--accent2:#2d6b4a;--accent3:#4d9e72;--glow:#c8f0d8;--glow2:#e8f7ef;--surface:#ffffff;--r:14px}
body{font-family:'DM Sans',sans-serif;background:var(--cream2);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;font-size:15px}
a{text-decoration:none;color:inherit}

nav{background:rgba(245,242,235,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--cream3);padding:0 2.5rem;height:62px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px;font-weight:500;font-size:17px;letter-spacing:-.4px}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center}
.logo-mark img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.logo-word span{color:var(--accent2)}

.page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem}
.card{background:var(--surface);border:1px solid var(--cream3);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 4px 32px rgba(0,0,0,.06)}
.card-icon{font-size:2.5rem;text-align:center;margin-bottom:1rem}
.card h1{font-family:'DM Serif Display',serif;font-size:1.8rem;text-align:center;margin-bottom:.3rem}
.card-sub{font-size:14px;color:var(--ink3);text-align:center;margin-bottom:1.8rem}

.form-group{margin-bottom:1.2rem}
label{display:block;font-size:12px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
input{width:100%;padding:11px 14px;border-radius:10px;border:1.5px solid var(--cream3);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border .2s,box-shadow .2s}
input:focus{border-color:var(--accent3);box-shadow:0 0 0 3px rgba(77,158,114,.1)}

.error-box{display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:13px;color:#b91c1c;margin-bottom:1rem}
.success-box{display:none;background:var(--glow2);border:1px solid rgba(77,158,114,.3);border-radius:8px;padding:12px 14px;font-size:13.5px;color:var(--accent2);margin-bottom:1rem;line-height:1.5}

.btn-login{width:100%;padding:12px;border-radius:28px;background:var(--accent);color:var(--glow);border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-bottom:1rem}
.btn-login:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

.link-row{text-align:center;font-size:13.5px;color:var(--ink3)}
.link-row a{color:var(--accent2);font-weight:500}
.link-row a:hover{text-decoration:underline}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-mark">
      <img src="logo.png?v=2" alt="Nextwork">
    </div>
    <span class="logo-word">next<span>work</span></span>
  </a>
</nav>

<div class="page">
  <!-- FORM: nueva contraseña -->
  <div class="card" id="reset-card" style="display:none">
    <div class="card-icon">🔑</div>
    <h1>Crea tu nueva contraseña</h1>
    <p class="card-sub">Elige una contraseña segura para tu cuenta</p>

    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="new-password-2" placeholder="Repite la contraseña" autocomplete="new-password" onkeydown="if(event.key==='Enter')doReset()">
    </div>

    <div class="error-box" id="reset-error"></div>

    <button class="btn-login" id="reset-btn" onclick="doReset()">Guardar nueva contraseña</button>
  </div>

  <!-- LINK INVALIDO / EXPIRADO -->
  <div class="card" id="invalid-card" style="display:none">
    <div class="card-icon">⏰</div>
    <h1>Link expirado</h1>
    <p class="card-sub">Este link de recuperación ya no es válido. Solicita uno nuevo.</p>
    <a href="login.html" style="display:block"><button class="btn-login">Volver a iniciar sesión</button></a>
  </div>

  <!-- EXITO -->
  <div class="card" id="done-card" style="display:none">
    <div class="card-icon">✅</div>
    <h1>¡Listo!</h1>
    <p class="card-sub">Tu contraseña se actualizó correctamente.</p>
    <a href="dashboard.html" style="display:block"><button class="btn-login">Ir a mi dashboard →</button></a>
  </div>

  <!-- LOADING -->
  <div class="card" id="loading-card">
    <p style="text-align:center;color:var(--ink3);font-size:14px">Verificando tu link…</p>
  </div>
</div>

<script>
const _sb = window.supabase.createClient(
  'https://vkewxmrutpjmdrxsqdea.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZXd4bXJ1dHBqbWRyeHNxZGVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjUwMTYsImV4cCI6MjA5NDEwMTAxNn0.Ety8tIitQKW_3hEaH0obDnmewPx2Opx_ZPmUmIP9ZU0'
);

function showCard(id){
  ['reset-card','invalid-card','done-card','loading-card'].forEach(c=>{
    document.getElementById(c).style.display = c===id ? 'block' : 'none';
  });
}

/* Supabase entrega el token de recuperacion en el hash de la URL y dispara
   el evento PASSWORD_RECOVERY al cargar la sesion temporal */
let recoveryReady=false;
_sb.auth.onAuthStateChange((event, session)=>{
  if(event==='PASSWORD_RECOVERY'){
    recoveryReady=true;
    showCard('reset-card');
  }
});

/* Si el evento ya paso antes de que este script escuchara, revisamos la sesion directo */
(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  if(session && !recoveryReady){
    recoveryReady=true;
    showCard('reset-card');
    return;
  }
  /* Dar un pequeño margen al evento async antes de asumir que el link es invalido */
  setTimeout(()=>{
    if(!recoveryReady) showCard('invalid-card');
  }, 2500);
})();

async function doReset(){
  const p1=document.getElementById('new-password').value;
  const p2=document.getElementById('new-password-2').value;
  const errEl=document.getElementById('reset-error');
  const btn=document.getElementById('reset-btn');
  errEl.style.display='none';

  if(p1.length<6){errEl.textContent='La contraseña debe tener al menos 6 caracteres.';errEl.style.display='block';return;}
  if(p1!==p2){errEl.textContent='Las contraseñas no coinciden.';errEl.style.display='block';return;}

  btn.textContent='Guardando...';btn.disabled=true;

  const {error}=await _sb.auth.updateUser({password:p1});

  if(error){
    errEl.textContent=error.message;errEl.style.display='block';
    btn.textContent='Guardar nueva contraseña';btn.disabled=false;
    return;
  }

  showCard('done-card');
}
</script>
</body>
</html>
