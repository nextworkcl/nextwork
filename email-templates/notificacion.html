<!--
  Plantilla UNICA de EmailJS, reutilizada por las dos funciones edge que
  mandan correo (send-notification-email y weekly-digest). El plan
  gratuito de EmailJS solo permite 2 plantillas y ya estan ocupadas por
  otras (Auto-Reply, Contact Us) -- en vez de pedir que actualices el
  plan, cada funcion arma su propio contenido interno como HTML y lo
  manda en UNA sola variable ({{content_html}}), asi esta plantilla le
  sirve a cualquier tipo de correo que Nextwork necesite mandar en el
  futuro sin gastar otro slot.

  Va pegada tal cual en:
    EmailJS (emailjs.com) -> Email Templates -> Create New Template
    -> boton "</> Code Editor" (arriba a la derecha del editor)
    -> pegar TODO este archivo, reemplazando lo que venga por defecto.
    -> en el campo "Subject" (fuera del editor de HTML) poner: {{subject}}

  Usa tablas en vez de flexbox/grid a proposito: es lo unico que Outlook
  renderiza de forma confiable. Todos los estilos van inline.

  Variables:
    {{subject}}      -- asunto del correo (EmailJS lo toma del campo Subject)
    {{to_name}}      -- nombre de quien recibe el correo
    {{content_html}} -- el cuerpo del correo, ya armado como HTML por la
                        funcion edge que lo manda (distinto segun el tipo
                        de correo). EmailJS no escapa HTML en variables,
                        asi que se inserta tal cual.
-->
<div style="background-color:#ede9e0;padding:32px 16px;font-family:'DM Sans',Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;margin:0 auto;background-color:#ffffff;border-radius:14px;overflow:hidden;border:1px solid #dedad1;">

    <!-- HEADER -->
    <tr>
      <td style="background-color:#1a3a2a;padding:22px 32px;text-align:center;">
        <span style="font-family:Georgia,'Times New Roman',serif;font-size:20px;color:#c8f0d8;letter-spacing:-0.4px;">
          next<span style="color:#4d9e72;font-weight:bold;">work</span>
        </span>
      </td>
    </tr>

    <!-- CONTENIDO (distinto segun la funcion que manda el correo) -->
    <tr>
      <td>{{content_html}}</td>
    </tr>

    <!-- FOOTER -->
    <tr>
      <td style="padding:18px 32px 24px;border-top:1px solid #dedad1;text-align:center;">
        <p style="margin:0;font-size:11.5px;line-height:1.6;color:#7a7870;">
          Hola {{to_name}} — recibiste este correo porque tienes una cuenta activa en Nextwork.<br>
          <a href="https://nextwork-55o.pages.dev/dashboard.html" style="color:#2d6b4a;text-decoration:underline;">Ir a mi Dashboard</a>
        </p>
      </td>
    </tr>

  </table>
</div>
